apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: metrics
spec:
  type: NodePort
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 32317 
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus-exporter
      port: 9464
      targetPort: 9464