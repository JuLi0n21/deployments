apiVersion: v1
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
             endpoint: "0.0.0.0:4317"
          http: {}

    processors:
      batch: {}

    exporters:
      prometheus:
        endpoint: "0.0.0.0:9464"
      otlp:
        endpoint: "http://jaeger-collector:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]

kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: metrics
