apiVersion: v1
kind: Namespace
metadata:
  name: metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docker-registry-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-auth
type: Opaque
stringData:
  htpasswd: "deployer:$2y$05$ap92FPHzT1TPXwkEO7lQ5uX.CuHUzoxMYIwCJNo49PhbXr5oc9T7S"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_AUTH
              value: "htpasswd"
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: "Registry Realm"
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: "/auth/htpasswd"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_STORAGE_CACHE_BLOBDESCRIPTOR
              value: "inmemory"
            - name: REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin
              value: '["https://docker-ui.illegalesachen.download"]'
            - name: REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods
              value: '["HEAD", "GET", "OPTIONS", "DELETE"]'
            - name: REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers
              value: '["Authorization", "Accept", "Cache-Control"]'
            - name: REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers
              value: '["Docker-Content-Digest"]'
            - name: REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials
              value: '["true"]'
          volumeMounts:
            - name: registry-auth
              mountPath: /auth
              readOnly: true
            - name: registry-storage
              mountPath: /var/lib/registry
      volumes:
        - name: registry-storage
          persistentVolumeClaim:
            claimName: docker-registry-pvc
        - name: registry-auth
          secret:
            secretName: registry-auth
---
apiVersion: v1
kind: Service
metadata:
  name: docker-registry
spec:
  selector:
    app: docker-registry
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 31000
