apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-frontend
  namespace: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-frontend
  template:
    metadata:
      labels:
        app: registry-frontend
    spec:
      containers:
        - name: frontend
          image: joxit/docker-registry-ui:main
          env:
            - name: NGINX_PROXY_PASS_URL
              value: "http://docker-registry:5000"
            - name: REGISTRY_TITLE
              value: "Supa Secret Vault"
            - name: DELETE_IMAGES
              value: "true"
            - name: REGISTRY_SECURED
              value: "true"
            - name: AUTH_TYPE
              value: "basic"
            - name: SINGLE_REGISTRY
              value: "true"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: registry-frontend
  namespace: metrics
spec:
  type: NodePort
  selector:
    app: registry-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31001
