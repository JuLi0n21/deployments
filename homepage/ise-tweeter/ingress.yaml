apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-gateway-services
  namespace: ise-tweeter 
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-set-headers: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: ise-tweeter.illegalesachen.download
      http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tweeter-auth-service
                port:
                  number: 80
          - path: /api/tweet(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tweeter-tweet-service
                port:
                  number: 80
          - path: /api/user(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tweeter-user-service
                port:
                  number: 80
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tweeter-frontend
                port:
                  number: 80
